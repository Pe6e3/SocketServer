name: Deploy SocketServer

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/pe6e3/SocketServer

            git checkout main
            git pull --ff-only origin main

            dotnet publish -c Release -o /home/pe6e3/SocketServer/publish

            sudo systemctl restart socketserver.service
            sudo systemctl status socketserver.service --no-pager
