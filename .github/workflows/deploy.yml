name: Deploy SocketServer

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/pe6e3/SocketServer

            git checkout main
            git pull --ff-only origin main

            dotnet publish SocketServer.csproj -c Release -o /home/pe6e3/SocketServer/bin/Release/net8.0/publish
            dotnet publish SocketConsoleClient/SocketConsoleClient.csproj -c Release -o /home/pe6e3/SocketServer/publish-client

            mkdir -p /home/pe6e3/.config/systemd/user
            cp -f /home/pe6e3/SocketServer/deploy/systemd-user/socketserver.service /home/pe6e3/.config/systemd/user/socketserver.service
            cp -f /home/pe6e3/SocketServer/deploy/systemd-user/socket-console-client.service /home/pe6e3/.config/systemd/user/socket-console-client.service

            if ! systemctl --user daemon-reload; then
              echo "ERROR: systemd --user is unavailable. Enable linger once: sudo loginctl enable-linger pe6e3"
              exit 1
            fi

            systemctl --user enable --now socketserver.service
            systemctl --user restart socketserver.service
            systemctl --user status socketserver.service --no-pager

            systemctl --user enable --now socket-console-client.service
            systemctl --user restart socket-console-client.service
            systemctl --user status socket-console-client.service --no-pager
